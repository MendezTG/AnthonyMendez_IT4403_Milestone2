<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookshelf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New';
        }
        body {
            background-color: #000000;
            color: #31da31;
            line-height: 1.6;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            border: 3px solid #31da31;
            min-height: 100vh;
            transition: 0.3s;
        }

        h1 {
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.8em;
            border-left: 5px solid ;
            padding-left: 10px;
            margin: 25px 0 15px;
        }
        nav {
            text-align: left;
            padding: 15px;
            margin-bottom:20px;
        }
        nav a {
            text-align: right;
            display: inline-block;
            border: 2px solid #31da31;
            padding: 8px 15px;
            text-decoration: none;
            color: #31da31;
            transition: 0.2s ease;
        }
        nav a:hover {
            background-color: #31da31;
            color: black;
        }

        #bookshelf{
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
            gap:20px;
            margin-top:20px;
        }


        .book{
            background:black;
            color:#31da31;
            padding:10px;
            border-radius:8px;
            text-align:center;
            transition:0.2s;
        }

        .book:hover{
            transform:scale(1.05);
        }

        .book img{
            width:120px;
            height:180px;
            margin-top:10px;
        }

        .book a{
            text-decoration:none;
            color:#31da31;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Bookshelf</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="Bookshelf.html">My Bookshelf</a>
    </nav>

    <div class="container">
        <div id="bookshelf"></div>
    </div>

    <script>
        $(document).ready(function(){

            const myBooks = [
            "OQQtDwAAQBAJ",
            "ykiHygEACAAJ",
            "n-lPcJypkjcC",
            "zqw8AwAAQBAJ",
            "BYzwAQAAQBAJ",
            "dFHSswEACAAJ"
            ];

            myBooks.forEach(function(id){

                let url = "https://www.googleapis.com/books/v1/volumes/" + id;

                $.getJSON(url,function(book){

                    let title = book.volumeInfo.title;
                    let thumbnail = "";
                    if(book.volumeInfo.imageLinks){
                        thumbnail = book.volumeInfo.imageLinks.thumbnail;
                    }

                    $("#bookshelf").append(`
                        <div class="book">
                            <h2>
                                <a href="details.html?id=${id}">
                                    ${title}
                                </a>
                            </h2>
                            <img src="${thumbnail}">
                        </div>
                    `)
                });
            });
        });
    </script>
</body>
</html>
