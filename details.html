<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Courier New';
            box-sizing: border-box;
        }
        body {
            background-color: hsl(15, 73%, 86%);
            color: hsl(235, 27%, 28%);
            line-height: 1.6;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        nav a {
            text-decoration:none;
            color:hsl(235,27%,28%);
            padding:8px 15px;
            border-radius:6px;
            transition:0.2s;
        }
        nav a:hover {
            background:hsl(14,55%,90%);
        }
        
        .details{
            display:flex;
            gap:30px;
            background:white;
            border-radius:10px;
            padding:20px;
            box-shadow:0 2px 10px hsla(0, 0%, 0%, 0.1);
            margin-top:20px;
        }

        .details img{
            width:200px;
            height:auto;
            max-height: 300px;
            object-fit: contain;
            border-radius:6px;
        }

        .book-info{
            flex:1;
        }

        .book-info p{
            margin-bottom:10px;
        }

        .description{
            margin-top:15px;
            line-height:1.7;
        }

    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Book Deails Page</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="bookshelf.html">My Bookshelf</a>
    </nav>

    <div class="container">
        <div id="details"></div>
    </div>

    <script>
        $(document).ready(function(){

            const parameter = new URLSearchParams(window.location.search);
            const id = parameter.get("id");
            
            let url = "https://www.googleapis.com/books/v1/volumes/" + id;

            $.getJSON(url, function(book){

                let title = book.volumeInfo.title;
                let thumbnail = "";
                if(book.volumeInfo.imageLinks){
                    thumbnail = book.volumeInfo.imageLinks.thumbnail;
                }
                let authors = book.volumeInfo.authors ? book.volumeInfo.authors.join(", ") : "Unknown";
                let publisher = book.volumeInfo.publisher || "Unknown";
                let desc = book.volumeInfo.description || "No Description Available";
                let price = "Not Available";
                if(book.saleInfo && book.saleInfo.listPrice){
                    price = book.saleInfo.listPrice.amount;
                }

                $("#details").html(`
                <div class="details">
                    <img src="${thumbnail}" alt="${title}">
                    <div class="book-info">
                        <h2>${title}</h2>
                        <p>Author: ${authors}</p>
                        <p>Publisher: ${publisher}</p>
                        <p>Price: ${price}</p>
                        <p class="description">${desc}</p>
                    </div>
                </div>
                `)
                
            });
        });
    </script>
</body>
</html>
