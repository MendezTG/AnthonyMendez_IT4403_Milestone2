<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookshelf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Courier New';
            box-sizing: border-box;
        }
        body {
            background-color: hsl(15, 73%, 86%);
            color: hsl(235, 27%, 28%);
            line-height: 1.6;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
        }

        h2 {
            font-size: 1rem;
            margin-bottom: 10px;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        nav a {
            text-decoration:none;
            color:hsl(235,27%,28%);
            padding:8px 15px;
            border-radius:6px;
            transition:0.2s;
        }
        nav a:hover {
            background:hsl(14,55%,90%);
        }

        #bookshelf{
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
            gap:20px;
        }


        .book{
            background:hsl(12, 31%, 90%);
            padding:15px;
            border-radius:10px;
            text-align:center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition:0.2s;
        }

        .book:hover{
            transform:translateY(-5px);
        }

        .book img{
            width:120px;
            height:180px;
            object-fit: contain;
            margin-top:10px;
            border-radius: 4px;
        }

        .book a{
            text-decoration:none;
            color:hsl(235,27%,28%);
            font-weight: bold;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Bookshelf</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="bookshelf.html">My Bookshelf</a>
    </nav>

    <div class="container">
        <div id="bookshelf"></div>
    </div>

    <script>
        $(document).ready(function(){

            const myBooks = [
            "OQQtDwAAQBAJ",
            "ykiHygEACAAJ",
            "n-lPcJypkjcC",
            "zqw8AwAAQBAJ",
            "BYzwAQAAQBAJ",
            "dFHSswEACAAJ"
            ];

            myBooks.forEach(function(id){

                let url = "https://www.googleapis.com/books/v1/volumes/" + id;

                $.getJSON(url,function(book){

                    let title = book.volumeInfo.title;
                    let thumbnail = "";
                    if(book.volumeInfo.imageLinks){
                        thumbnail = book.volumeInfo.imageLinks.thumbnail;
                    }

                    $("#bookshelf").append(`
                        <div class="book">
                            <h2>
                                <a href="details.html?id=${id}">
                                    ${title}
                                </a>
                            </h2>
                            <img src="${thumbnail}">
                        </div>
                    `)
                });
            });
        });
    </script>
</body>
</html>
